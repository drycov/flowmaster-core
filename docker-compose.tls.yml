# Production HTTPS — Let's Encrypt (single entry point, no -f merge conflicts).
#
#   docker compose -f docker-compose.tls.yml up -d --build
#   docker compose -f docker-compose.tls.yml --profile cron up -d
#
# Requires in .env: PROXY_DOMAIN, CERTBOT_EMAIL, HTTPS URLs for VITE_* / APP_URL

name: flowmaster

include:
  - path:
      - ./docker/supabase/docker-compose.yml
      - ./docker/compose/supabase.overrides.yml
      - ./docker/compose/nginx-tls.overrides.yml

services:
  db-migrate:
    image: postgres:15-alpine
    restart: "no"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_USER: postgres
      APPLY_DB_MIGRATIONS: ${APPLY_DB_MIGRATIONS:-1}
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed/seed.sql:ro
      - ./docker/migrate/apply-migrations.sh:/apply-migrations.sh:ro
    entrypoint: ["/bin/sh", "/apply-migrations.sh"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
        SUPABASE_URL: http://kong:8000
        SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-${SERVICE_ROLE_KEY}}
        SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-${JWT_SECRET}}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-${SERVICE_ROLE_KEY}}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-${JWT_SECRET}}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  cron:
    image: alpine:3.21
    profiles: ["cron"]
    env_file:
      - .env
    environment:
      APP_URL: http://app:3000
      CRON_SECRET: ${CRON_SECRET}
      CRON_INTERVAL_SEC: ${CRON_INTERVAL_SEC:-90}
      ENABLE_TELEGRAM_POLL: ${ENABLE_TELEGRAM_POLL:-0}
      RUN_ONCE: "0"
    volumes:
      - ./scripts/cron-runner.sh:/cron-runner.sh:ro
    entrypoint: ["/bin/sh", "/cron-runner.sh"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
