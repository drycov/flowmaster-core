# Production HTTPS — Let's Encrypt (single entry point, no root service conflicts).
#
#   docker compose -f docker-compose.tls.yml --profile office up -d --build
#   docker compose -f docker-compose.tls.yml --profile cron --profile office up -d
#
# npm run compose:tls / compose:tls:cron — ONLYOFFICE (profile office) включён по умолчанию.
#
# Requires in .env: PROXY_DOMAIN, CERTBOT_EMAIL, HTTPS URLs for VITE_* / APP_URL

name: flowmaster

include:
  - path:
      - ./docker/supabase/docker-compose.yml
      - ./docker/compose/supabase.overrides.yml
      - ./docker/compose/flowmaster.services.yml
      - ./docker/compose/nginx-tls.overrides.yml
