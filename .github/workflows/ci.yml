name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
          SUPABASE_JWT_SECRET: placeholder-jwt-secret-for-ci-build-only

  smoke-db:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_SUPABASE_URL != '' && secrets.E2E_SUPABASE_SERVICE_ROLE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run uat:smoke:db
        env:
          SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}

  smoke-staging:
    runs-on: ubuntu-latest
    if: >-
      ${{ secrets.STAGING_APP_URL != '' &&
          secrets.CRON_SECRET != '' &&
          secrets.E2E_SUPABASE_URL != '' &&
          secrets.E2E_SUPABASE_SERVICE_ROLE_KEY != '' &&
          secrets.E2E_EMAIL != '' &&
          secrets.E2E_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx playwright install --with-deps chromium

      - run: npm run uat:smoke:full
        env:
          APP_URL: ${{ secrets.STAGING_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_BASE_URL: ${{ secrets.STAGING_APP_URL }}
          E2E_SKIP_SERVER: "1"
          CI: true

  e2e:
    runs-on: ubuntu-latest
    if: >-
      ${{ secrets.E2E_EMAIL != '' &&
          secrets.E2E_PASSWORD != '' &&
          secrets.E2E_SUPABASE_URL != '' &&
          secrets.E2E_SUPABASE_PUBLISHABLE_KEY != '' &&
          secrets.E2E_SUPABASE_SERVICE_ROLE_KEY != '' &&
          secrets.E2E_SUPABASE_JWT_SECRET != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.E2E_SUPABASE_JWT_SECRET }}
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
