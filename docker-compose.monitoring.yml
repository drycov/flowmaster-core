# Опциональный мониторинг: Prometheus + Grafana + exporters
#
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml --profile monitoring up -d
#   npm run docker:monitoring
#
# UI только на localhost (127.0.0.1). Для доступа с другой машины — SSH tunnel.

services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: flowmaster-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      blackbox-exporter:
        condition: service_started

  grafana:
    image: grafana/grafana:11.5.2
    container_name: flowmaster-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_started

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.26.0
    container_name: flowmaster-blackbox
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./docker/monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "127.0.0.1:${BLACKBOX_PORT:-9115}:9115"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: flowmaster-postgres-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: flowmaster-cadvisor
    profiles: ["monitoring"]
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "127.0.0.1:${CADVISOR_PORT:-8081}:8080"

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: flowmaster-node-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:${NODE_EXPORTER_PORT:-9100}:9100"

volumes:
  prometheus_data:
  grafana_data:
