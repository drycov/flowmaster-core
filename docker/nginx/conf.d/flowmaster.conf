# ЕСЭДО — reverse proxy: приложение + Supabase API через один порт.
# Static upstreams: compose depends_on ensures app/kong are healthy before nginx starts.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 500m;

    # Supabase Auth cookies / JWT headers
    large_client_header_buffers 4 16k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Supabase Auth (large cookies)
    location /auth {
        proxy_pass http://kong:8000;
    }

    location /rest {
        proxy_pass http://kong:8000;
    }

    location /graphql {
        proxy_pass http://kong:8000;
    }

    location /realtime/ {
        proxy_pass http://kong:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /storage/v1/ {
        proxy_pass http://kong:8000;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        client_max_body_size 0;
    }

    location /functions {
        proxy_pass http://kong:8000;
    }

    location /mcp {
        proxy_pass http://kong:8000;
    }

    location /sso {
        proxy_pass http://kong:8000;
    }

    # ЕСЭДО (SSR + API routes)
    location / {
        proxy_set_header Host $http_host;
        proxy_pass http://app:3000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
