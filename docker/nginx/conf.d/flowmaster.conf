# ЕСЭДО — reverse proxy: приложение + Supabase API через один порт.
# Монтируется в nginx:alpine как /etc/nginx/conf.d/default.conf

upstream flowmaster_app {
    server app:3000;
    keepalive 8;
}

upstream flowmaster_kong {
    server kong:8000;
    keepalive 8;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 500m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Supabase Auth (large cookies)
    location /auth {
        proxy_pass http://flowmaster_kong;
        large_client_header_buffers 4 16k;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location /rest {
        proxy_pass http://flowmaster_kong;
    }

    location /graphql {
        proxy_pass http://flowmaster_kong;
    }

    location /realtime/ {
        proxy_pass http://flowmaster_kong;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /storage/v1/ {
        proxy_pass http://flowmaster_kong;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        client_max_body_size 0;
    }

    location /functions {
        proxy_pass http://flowmaster_kong;
    }

    location /mcp {
        proxy_pass http://flowmaster_kong;
    }

    location /sso {
        proxy_pass http://flowmaster_kong;
    }

    # ЕСЭДО (SSR + API routes)
    location / {
        proxy_pass http://flowmaster_app;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
