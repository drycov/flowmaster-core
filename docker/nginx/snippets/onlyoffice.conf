# ONLYOFFICE Document Server (profile: office)
# Public URL in admin settings: http(s)://<host>/onlyoffice  (no trailing slash)
#
# Subpath requires X-Forwarded-Host with /onlyoffice suffix — otherwise DS redirects to /welcome on site root.
# See: https://github.com/ONLYOFFICE/document-server-proxy/blob/master/nginx/proxy-to-virtual-path.conf

# Fallback when Document Server already redirected the browser to site root
location = /welcome {
    return 301 /onlyoffice/welcome/;
}

location /onlyoffice/ {
    proxy_pass http://onlyoffice:80/;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 500m;
}
