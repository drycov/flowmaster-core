# HTTPS (Let's Encrypt) — merge via include path in docker-compose.tls.yml
# Kong/app ports are not published; nginx terminates TLS.

services:
  app:
    ports: !reset []

  kong:
    ports: !reset []

  nginx:
    image: jonasal/nginx-certbot:6.2.0-nginx1.31.0
    container_name: flowmaster-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      app:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      PROXY_DOMAIN: ${PROXY_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      CERTBOT_DOMAIN: ${PROXY_DOMAIN}
      DHPARAM_SIZE: "2048"
      SSL_SELF_SIGNED_FALLBACK: ${SSL_SELF_SIGNED_FALLBACK:-1}
    command:
      - /bin/bash
      - /etc/nginx/tls-entrypoint.sh
    volumes: !override
      - ../../docker/nginx/flowmaster-nginx.conf.tpl:/etc/nginx/flowmaster-nginx.conf.tpl:ro
      - ../../docker/nginx/tls-entrypoint.sh:/etc/nginx/tls-entrypoint.sh:ro
      - ../../docker/nginx/ensure-self-signed-cert.sh:/etc/nginx/ensure-self-signed-cert.sh:ro
      - ../../docker/nginx/run-certbot-with-fallback.sh:/etc/nginx/run-certbot-with-fallback.sh:ro
      - nginx_letsencrypt:/etc/letsencrypt
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header='Host: ${PROXY_DOMAIN}' http://127.0.0.1/api/health >/dev/null 2>&1 || wget -qO- --no-check-certificate --header='Host: ${PROXY_DOMAIN}' https://127.0.0.1/api/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s

volumes:
  nginx_letsencrypt:
