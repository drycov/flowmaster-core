# Patches for vendored Supabase stack — must be merged via include path, not root services:
#   include:
#     - path:
#         - ./docker/supabase/docker-compose.yml
#         - ./docker/compose/supabase.overrides.yml

services:
  kong:
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
      realtime:
        condition: service_healthy
      storage:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  supavisor:
    ports:
      - "127.0.0.1:54322:5432"
      - "127.0.0.1:6543:6543"

  studio:
    profiles: ["studio"]

  meta:
    profiles: ["studio"]

  functions:
    profiles: ["studio"]
