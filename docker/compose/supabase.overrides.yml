# Patches for vendored Supabase stack — must be merged via include path, not root services:
#   include:
#     - path:
#         - ./docker/supabase/docker-compose.yml
#         - ./docker/compose/supabase.overrides.yml
#
# Supavisor: base compose publishes 5432/6543 on all interfaces — override to localhost-only.
# Transaction pooler (6543) is NOT published on the host (avoids port conflicts; unused by app).
# For pg_dump from the host use POSTGRES_HOST_PORT (default 54322 → container 5432).

services:
  kong:
    entrypoint: ["/bin/bash", "/home/kong/kong-entrypoint.sh"]
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
      realtime:
        condition: service_healthy
      storage:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully

  supavisor:
    ports: !override
      - "127.0.0.1:${POSTGRES_HOST_PORT:-54322}:5432"

  studio:
    profiles: ["studio"]
    ports:
      - "127.0.0.1:${STUDIO_PORT:-54323}:3000"

  meta:
    profiles: ["studio"]

  functions:
    profiles: ["studio"]
