# Flowmaster app + nginx + migrate + cron — include from docker-compose*.yml
# Paths are relative to THIS file (docker/compose/), not the repo root.

services:
  db-migrate:
    image: postgres:15-alpine
    restart: "no"
    env_file:
      - ../../.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_USER: postgres
      APPLY_DB_MIGRATIONS: ${APPLY_DB_MIGRATIONS:-1}
    volumes:
      - ../../supabase/migrations:/migrations:ro
      - ../../supabase/seed.sql:/seed/seed.sql:ro
      - ../../docker/migrate/apply-migrations.sh:/apply-migrations.sh:ro
    entrypoint: ["/bin/sh", "/apply-migrations.sh"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
        SUPABASE_URL: http://kong:8000
        SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-${SERVICE_ROLE_KEY}}
        SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-${JWT_SECRET}}
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-${SERVICE_ROLE_KEY}}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-${JWT_SECRET}}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-${ANON_KEY}}
      MONITORING_GRAFANA_URL: ${MONITORING_GRAFANA_URL:-}
      LICENSE_SERVER_ENABLED: ${LICENSE_SERVER_ENABLED:-false}
      LICENSE_MODE: ${LICENSE_MODE:-offline}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-}
      LICENSE_SIGNING_SECRET: ${LICENSE_SIGNING_SECRET:-}
      LICENSE_SERVER_ADMIN_SECRET: ${LICENSE_SERVER_ADMIN_SECRET:-}
      ONLYOFFICE_CALLBACK_BASE_URL: ${ONLYOFFICE_CALLBACK_BASE_URL:-http://nginx}
      ONLYOFFICE_STORAGE_INTERNAL_URL: ${ONLYOFFICE_STORAGE_INTERNAL_URL:-http://kong:8000}
      ONLYOFFICE_JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-false}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: flowmaster-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ../../docker/nginx/conf.d/flowmaster.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../docker/nginx/snippets/onlyoffice.conf:/etc/nginx/snippets/onlyoffice.conf:ro
    depends_on:
      app:
        condition: service_healthy
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  cron:
    image: alpine:3.21
    profiles: ["cron"]
    env_file:
      - ../../.env
    environment:
      APP_URL: http://app:3000
      CRON_SECRET: ${CRON_SECRET}
      CRON_INTERVAL_SEC: ${CRON_INTERVAL_SEC:-90}
      ENABLE_TELEGRAM_POLL: ${ENABLE_TELEGRAM_POLL:-0}
      RUN_ONCE: "0"
    volumes:
      - ../../scripts/cron-runner.sh:/cron-runner.sh:ro
    entrypoint: ["/bin/sh", "/cron-runner.sh"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  onlyoffice:
    image: onlyoffice/documentserver:8.2.2
    container_name: flowmaster-onlyoffice
    profiles: ["office"]
    environment:
      JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-false}
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      USE_UNAUTHORIZED_STORAGE: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      # Override only custom keys; do NOT mount local.json (replaces DB/AMQP/Redis config).
      - ../../docker/onlyoffice/local-production-linux.json:/etc/onlyoffice/documentserver/local-production-linux.json
    ports:
      - "${ONLYOFFICE_HTTP_PORT:-8082}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 180s

volumes:
  onlyoffice_data:
  onlyoffice_logs:
