# Staging / UAT patches — include after flowmaster.services.yml

services:
  app:
    build:
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports: !override
      - "${STAGING_PORT:-3001}:3000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SENTRY_ENVIRONMENT: staging
      DISABLE_TELEGRAM_POLLING: ${DISABLE_TELEGRAM_POLLING:-true}

  nginx:
    ports: !override
      - "${STAGING_NGINX_PORT:-8080}:80"
    healthcheck:
      retries: 3

  cron:
    profiles: !reset []
    environment:
      CRON_INTERVAL_SEC: ${CRON_INTERVAL_SEC:-60}
